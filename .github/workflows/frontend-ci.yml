name: Frontend Pipeline 

# the trigger - when pull request and push is created on those branches only 
on:
    push:
        branches: [main, dev]
        paths:
            - 'apps/frontend/**' 
    pull_request:
        paths:
            - 'apps/frontend/**'

jobs:
