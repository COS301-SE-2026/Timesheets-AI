# workflow configuration where it automatically runs tests for the backend
name: Backend Pipeline 

# the trigger - when pull request and push is created on those branches only 

on:
    push:
        branches: [main, dev]
        # paths:
        #     - 'apps/backend/**' 
    pull_request:
        branches: [main, dev]
        # paths:
        #     - 'apps/backend/**'

jobs:
    # this is only for backend check only and provide job access to the code in the repo 
    # ubuntu latest - Github will uses linux machine - better and minimize build minutes
    backend-check:
        runs-on: ubuntu-latest
        steps:
        # Note here: check if we use checkout@sha - that was in lecture slides not v4 (could be more secure)
        - uses: actions/checkout@v4 

        # Logic Gate: This is used to determine if the files changed are in Backend
        # dorny repo is used in this logic gate - this is using SHA instead of versions for security suggested by SonarQube 
        # The SHA is version 3 (v3.0.3)
        - name: Check for Backend Changes
          id: filter
          uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 
          with:
            filters: |
                backend:
                 - 'apps/backend/**'
                 - '.github/workflows/backend-ci.yml'
        # Only runs if backend changes 
        - name: Set up JDK 17
          if: steps.filter.outputs.backend == 'true'
          uses: actions/setup-java@v4
          with:
            # these lines tell Github Actions which installer and distribution to install
            java-version: '17'
            distribution: 'temurin'
            # maven (pom.xml) will be used to download dependencies and it will be cache so it will spped up with the builds
            cache: 'maven'
            cache-dependency-path: apps/backend/pom.xml
        - name: Build with Maven 
          if: steps.filter.outputs.backend == 'true'
          run: mvn -f apps/backend/pom.xml clean verify 