version: "3.9"

# Momently, local development stack
# Starts: PostgreSQL, Redis, Backend (Spring Boot), Frontend (Angular), AI Service (FastAPI)
#
# Usage:
#   docker compose up -d              # start everything in background
#   docker compose up -d postgres     # start only the database
#   docker compose logs -f backend    # tail backend logs
#   docker compose down               # stop everything (keeps volumes)
#   docker compose down -v            # stop and wipe all data

services:
  #Database
  postgres:
    image: postgres:15-alpine
    container_name: momently-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: momently_dev
      POSTGRES_USER: momently
      POSTGRES_PASSWORD: momently_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U momently -d momently_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  #Cache
  redis:
    image: redis:7-alpine
    container_name: momently-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: momently-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/momently_dev
      DB_USERNAME: momently
      DB_PASSWORD: momently_dev_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-only-secret-replace-in-production-min-32-chars-abc123
      JWT_EXPIRATION_MS: 86400000
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./apps/backend:/workspace:ro
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  #Frontend
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: dev
    container_name: momently-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_URL: http://backend:8080
    ports:
      - "4200:4200"
    volumes:
      - ./apps/frontend/client:/app/client
      - /app/client/node_modules

  #AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: momently-ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgresql://momently:momently_dev_password@postgres:5432/momently_dev
      BACKEND_URL: http://backend:8080
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    name: momently-postgres-data
