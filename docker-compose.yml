# Momently, local development stack
# Starts: PostgreSQL, Redis, Backend (Spring Boot), Frontend (Angular), AI Service (FastAPI)
#
# Usage:
#   docker compose up -d              # start everything in background
#   docker compose up -d postgres     # start only the database
#   docker compose logs -f backend    # tail backend logs
#   docker compose down               # stop everything (keeps volumes)
#   docker compose down -v            # stop and wipe all data

services:
  postgres:
    image: postgres:15-alpine
    container_name: momently-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-momently_dev}
      POSTGRES_USER: ${DB_USERNAME:-momently}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"   # FIX: host uses 5433, container still uses 5432 (correct internal port)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"] 
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: momently-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: momently-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      SPRING_PROFILES_ACTIVE: dev

      # FIX: correct Docker networking (NEVER localhost inside containers)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-momently_dev}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-momently}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}

    ports:
      - "8080:8080"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"] 
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: dev
    container_name: momently-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_URL: http://backend:8080
    ports:
      - "4200:4200"
    volumes:
      - ./apps/frontend/client:/app/client
      - /app/client/node_modules

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: momently-ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgresql://${DB_USERNAME:-momently}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-momently_dev}
      BACKEND_URL: http://backend:8080
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    name: momently-postgres-data
