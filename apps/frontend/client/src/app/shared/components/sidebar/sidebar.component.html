<!-- I am going to use mordern version instead of ngFor-->
 <!-- <a class="nav-item" - each item becomes a clickable link and the one clicked on will add class active and it will get active styling -->
<nav class="nav-links">
    @for (item of navItems(); track item.label) {
        <a 
            class="nav-item"
            [class.active]="item.label === activeItem()"
            (click)="setActive(item.label)">
            <span class="nav-icon" [ngClass]="item.icon"></span>
            <span class="nav-label">{{ item.label }}</span>
        </a>
    }
</nav>
