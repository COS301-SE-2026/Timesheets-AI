<div class="showcase-page">

  <section>
    <h2>Buttons</h2>

    <div class="component-row">
      <app-button variant="primary">Primary</app-button>
      <app-button variant="secondary">Secondary</app-button>
      <app-button variant="tertiary">Tertiary</app-button>
    </div>
  </section>

  <section>
    <h2>Input Field</h2>

    <app-input-field
      label="Project Name"
      placeholder="Enter project name">
    </app-input-field>
  </section>

  <section>
    <h2>Dropdown</h2>

    <app-dropdown
      [options]="['This Week', 'Last Week', 'This Month']">
    </app-dropdown>
  </section>

  <section>
    <h2>Loader</h2>

    <div class="component-row">
      <app-loader size="small"></app-loader>
      <app-loader size="medium"></app-loader>
      <app-loader size="large"></app-loader>
    </div>
  </section>

  <section>
    <h2>Progress Bar</h2>

    <app-progress-bar [progress]="75"></app-progress-bar>
  </section>

</div>
