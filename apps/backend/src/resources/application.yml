server:
  port: 8080

spring:
  application:
    name: timesheet-ai
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/momently}
    username: ${DB_USERNAME:momently}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
  //we will use environment variables for the secret and expiration, but provide defaults for development.
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expirationMs: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    timesheets: INFO
